<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Age Prime Checker</title>
    <link rel="stylesheet" href="styles.css">
</head>

    <body>
        <h1>Age Prime Number Checker</h1>
        
        <label for="birthYear">Enter your birth year:</label><br>
        <input type="number" id="birthYear" placeholder="e.g. 2000" min="1900" max="2026"><br>
        <button onclick="checkAgePrime()">Check My Age</button>
        
        <script src="script.js"></script>
    </body>
</html>
